
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Students Portal — CRUD Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --brand: #4f46e5;
    --brand-dark: #4338ca;
    --brand-soft: #eef2ff;
    --success: #16a34a;
    --success-soft: #dcfce7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --warning: #d97706;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.05);
    --shadow: 0 10px 30px -10px rgba(79,70,229,.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, #ddd6fe 0%, transparent 40%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .shell { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }

  /* ---------- Topbar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--brand), #7c3aed);
    display: grid; place-items: center; color: white;
    box-shadow: var(--shadow);
  }
  .brand-icon svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .brand-title { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
  .brand-sub { font-size: 12px; color: var(--muted); }

  .user-chip {
    display: none; align-items: center; gap: 10px;
    padding: 6px 6px 6px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 999px;
    font-size: 13px; font-weight: 500;
  }
  .user-chip.on { display: inline-flex; }
  .user-chip .avatar {
    width: 30px; height: 30px; border-radius: 999px; color: white;
    display: grid; place-items: center; font-weight: 600; font-size: 12px;
    background: var(--brand);
  }
  .logout-btn {
    border: none; background: transparent; color: var(--muted);
    padding: 6px 10px; font-size: 12px; cursor: pointer; border-radius: 6px;
  }
  .logout-btn:hover { background: #f1f5f9; color: var(--danger); }

  /* ---------- Cards ---------- */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; box-shadow: var(--shadow-sm);
  }

  /* ---------- Login ---------- */
  .login-wrap { max-width: 440px; margin: 40px auto; }
  .login-head { text-align: center; margin-bottom: 28px; }
  .login-head h1 { margin: 16px 0 6px; font-size: 24px; letter-spacing: -.02em; }
  .login-head p { color: var(--muted); margin: 0; font-size: 14px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .input {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border);
    border-radius: 10px; font: inherit; background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  .input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 18px; border-radius: 10px; border: 1px solid transparent;
    font: inherit; font-weight: 600; cursor: pointer;
    transition: transform .08s, background .15s, border-color .15s, color .15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--text); }
  .btn-ghost:hover { background: #f8fafc; }
  .btn-danger { background: var(--danger-soft); color: var(--danger); }
  .btn-danger:hover { background: #fecaca; }
  .btn-success { background: var(--success-soft); color: var(--success); }
  .btn-success:hover { background: #bbf7d0; }
  .btn-block { width: 100%; }
  .btn-sm { padding: 7px 12px; font-size: 13px; border-radius: 8px; }

  .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .user-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    background: #f8fafc; border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; text-align: left; transition: border-color .15s, background .15s;
  }
  .user-btn:hover { background: #f1f5f9; border-color: var(--brand); }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 8px; color: #fff;
    font-weight: 700; font-size: 12px; display: grid; place-items: center;
  }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-role { font-size: 11px; color: var(--muted); }

  .divider {
    text-align: center; color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; margin: 18px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .banner {
    display: none; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 14px;
  }
  .banner.on { display: flex; }
  .banner-error { background: var(--danger-soft); color: var(--danger); }
  .banner-success { background: var(--success-soft); color: var(--success); }

  /* ---------- Dashboard ---------- */
  .grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
  @media (min-width: 960px) { .grid { grid-template-columns: 340px 1fr; } }

  .section-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .1em; margin: 0 0 14px;
  }
  .section-title .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    background: var(--brand-soft); color: var(--brand);
    border-radius: 999px; font-size: 11px; letter-spacing: 0;
  }

  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .search {
    flex: 1; min-width: 200px; padding: 9px 12px 9px 34px;
    border: 1px solid var(--border); border-radius: 10px;
    background: #fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' viewBox='0 0 24 24'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.35-4.35'/></svg>") no-repeat 10px 50%;
    font: inherit;
  }
  .search:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }

  /* Table */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    background: #f8fafc; color: var(--muted); font-weight: 600;
    text-align: left; padding: 12px 14px; font-size: 12px;
    text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }

  .id-cell {
    display: inline-block; min-width: 28px; padding: 2px 8px;
    background: var(--brand-soft); color: var(--brand);
    border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .edit-input { width: 100%; padding: 6px 8px; border: 1px solid var(--brand); border-radius: 6px; font: inherit; }
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }

  /* Config panel */
  .config { margin-top: 18px; padding-top: 18px; border-top: 1px dashed var(--border); }
  .config summary {
    cursor: pointer; font-size: 12px; color: var(--muted);
    font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
    list-style: none;
  }
  .config summary::-webkit-details-marker { display: none; }
  .config summary::before { content: '⚙ '; }
  .config-body { margin-top: 12px; display: grid; gap: 10px; }

  /* Toast */
  .toast-host {
    position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100;
  }
  .toast {
    padding: 12px 16px; border-radius: 10px; background: #fff;
    border: 1px solid var(--border); box-shadow: 0 10px 30px -10px rgba(15,23,42,.15);
    font-size: 13px; font-weight: 500; min-width: 220px;
    animation: slide .25s ease-out;
  }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error   { border-left: 3px solid var(--danger); }
  .toast.info    { border-left: 3px solid var(--brand); }
  @keyframes slide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="toast-host" id="toasts"></div>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand-row">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5zM2 13l10 5 10-5M2 18l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="brand-title">Students Portal</div>
        <div class="brand-sub">CRUD Dashboard</div>
      </div>
    </div>

    <div class="user-chip" id="userChip">
      <div class="avatar" id="userAvatar">AD</div>
      <span id="userName">admin</span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <!-- ============ LOGIN VIEW ============ -->
  <section id="loginView" class="login-wrap">
    <div class="card">
      <div class="login-head">
        <h1>Sign in</h1>
        <p>Access the Students API dashboard</p>
      </div>

      <p class="section-title" style="margin-bottom:10px">Quick select</p>
      <div class="quick">
        <button class="user-btn" data-u="admin" data-p="admin123">
          <div class="user-avatar" style="background:#4f46e5">AD</div>
          <div><div class="user-name">Admin</div><div class="user-role">Full access</div></div>
        </button>
        <button class="user-btn" data-u="teacher" data-p="teach456">
          <div class="user-avatar" style="background:#0891b2">TE</div>
          <div><div class="user-name">Teacher</div><div class="user-role">Read &amp; manage</div></div>
        </button>
      </div>

      <div class="divider">or enter manually</div>

      <div class="banner banner-error" id="loginError">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="loginErrorText">Invalid credentials</span>
      </div>

      <div class="field">
        <label>Username</label>
        <input class="input" id="username" placeholder="Enter username" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input class="input" id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-block" id="loginBtn">
        <span id="loginBtnText">Sign in</span>
      </button>

      <details class="config">
        <summary>API settings</summary>
        <div class="config-body">
          <div class="field" style="margin:0">
            <label>API base URL</label>
            <input class="input" id="apiBase" value="http://127.0.0.1:8000" placeholder="http://your-ec2-ip:8000" />
          </div>
          <div class="field" style="margin:0">
            <label>Token endpoint</label>
            <input class="input" id="tokenPath" value="/login/" />
          </div>
          <div class="field" style="margin:0">
            <label>Students endpoint</label>
            <input class="input" id="studentsPath" value="/students/" />
          </div>
        </div>
      </details>
    </div>
  </section>

  <!-- ============ DASHBOARD VIEW ============ -->
  <section id="dashView" class="hidden">
    <div class="grid">

      <!-- CREATE CARD -->
      <aside class="card">
        <h2 class="section-title">Add new student</h2>
        <div class="field">
          <label>Name</label>
          <input class="input" id="f_name" placeholder="Jane Doe" />
        </div>
        <div class="field">
          <label>Age</label>
          <input class="input" id="f_age" type="number" min="1" placeholder="20" />
        </div>
        <div class="field">
          <label>Grade</label>
          <input class="input" id="f_grade" placeholder="A" />
        </div>
        <div class="field">
          <label>Email</label>
          <input class="input" id="f_email" type="email" placeholder="jane@example.com" />
        </div>
        <button class="btn btn-primary btn-block" id="createBtn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add student
        </button>
      </aside>

      <!-- LIST CARD -->
      <main class="card">
        <h2 class="section-title">Students <span class="count" id="studentsCount">0</span></h2>
        <div class="toolbar">
          <input class="search" id="searchInput" placeholder="Search by name or email…" />
          <button class="btn btn-ghost btn-sm" id="reloadBtn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:70px">ID</th>
                <th>Name</th>
                <th style="width:80px">Age</th>
                <th style="width:100px">Grade</th>
                <th>Email</th>
                <th style="width:170px; text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
          <div class="empty hidden" id="emptyState">No students yet — add the first one using the form on the left.</div>
        </div>
      </main>
    </div>
  </section>
</div>

<script>
/* ---------- Config & State ---------- */
const LS = {
  token: 'students.token',
  user: 'students.user',
  api: 'students.api',
  tokenPath: 'students.tokenPath',
  studentsPath: 'students.studentsPath',
};
const cfg = {
  api:           localStorage.getItem(LS.api)          || 'http://127.0.0.1:8000',
  tokenPath:     localStorage.getItem(LS.tokenPath)    || '/api/token/',
  studentsPath:  localStorage.getItem(LS.studentsPath) || '/students/',
};
let token = localStorage.getItem(LS.token) || null;
let currentUser = localStorage.getItem(LS.user) || null;
let allStudents = [];

/* ---------- DOM helpers ---------- */
const $ = (id) => document.getElementById(id);
const show = (el) => el.classList.remove('hidden');
const hide = (el) => el.classList.add('hidden');

function toast(msg, kind = 'info') {
  const host = $('toasts');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.style.opacity = 0; el.style.transform = 'translateX(20px)'; el.style.transition = '.25s'; }, 2600);
  setTimeout(() => el.remove(), 3000);
}

/* ---------- API ---------- */
function url(path) { return cfg.api.replace(/\/+$/, '') + path; }

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url(path), opts);
  if (res.status === 401) { logout(); throw new Error('Session expired — please log in again.'); }
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.detail || Object.values(data).flat().join(' ') || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

/* ---------- Auth ---------- */
async function login(username, password) {
  const btn = $('loginBtn'), txt = $('loginBtnText');
  const err = $('loginError'), errText = $('loginErrorText');
  err.classList.remove('on');
  btn.disabled = true; txt.textContent = 'Signing in…';

  // Persist settings
  cfg.api = $('apiBase').value.trim() || cfg.api;
  cfg.tokenPath = $('tokenPath').value.trim() || cfg.tokenPath;
  cfg.studentsPath = $('studentsPath').value.trim() || cfg.studentsPath;
  localStorage.setItem(LS.api, cfg.api);
  localStorage.setItem(LS.tokenPath, cfg.tokenPath);
  localStorage.setItem(LS.studentsPath, cfg.studentsPath);

  try {
    const res = await fetch(url(cfg.tokenPath), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || 'Invalid credentials');

    token = data.access || data.token;
    if (!token) throw new Error('No token in response');
    currentUser = username;
    localStorage.setItem(LS.token, token);
    localStorage.setItem(LS.user, username);

    enterDashboard();
    toast('Welcome, ' + username, 'success');
  } catch (e) {
    errText.textContent = e.message;
    err.classList.add('on');
  } finally {
    btn.disabled = false; txt.textContent = 'Sign in';
  }
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem(LS.token);
  localStorage.removeItem(LS.user);
  hide($('dashView')); show($('loginView'));
  $('userChip').classList.remove('on');
  toast('Logged out', 'info');
}

function enterDashboard() {
  hide($('loginView'));
  show($('dashView'));
  const chip = $('userChip'); chip.classList.add('on');
  $('userName').textContent = currentUser || '';
  $('userAvatar').textContent = (currentUser || '??').slice(0, 2).toUpperCase();
  loadStudents();
}

/* ---------- CRUD ---------- */
async function loadStudents() {
  try {
    const data = await api('GET', cfg.studentsPath);
    // Support both paginated ({results: [...]}) and plain array responses.
    allStudents = Array.isArray(data) ? data : (data.results || []);
    render();
  } catch (e) { toast(e.message, 'error'); }
}

async function createStudent() {
  const payload = {
    name:  $('f_name').value.trim(),
    age:   parseInt($('f_age').value, 10),
    grade: $('f_grade').value.trim(),
    email: $('f_email').value.trim(),
  };
  if (!payload.name || !payload.email) return toast('Name and email are required', 'error');
  try {
    const s = await api('POST', cfg.studentsPath, payload);
    allStudents.unshift(s);
    ['f_name','f_age','f_grade','f_email'].forEach(id => $(id).value = '');
    render();
    toast('Student added', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function updateStudent(id, payload) {
  try {
    const s = await api('PATCH', `${cfg.studentsPath}${id}/`, payload);
    const i = allStudents.findIndex(x => x.id === id);
    if (i >= 0) allStudents[i] = s;
    render();
    toast('Updated', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteStudent(id) {
  if (!confirm('Delete student #' + id + '?')) return;
  try {
    await api('DELETE', `${cfg.studentsPath}${id}/`);
    allStudents = allStudents.filter(x => x.id !== id);
    render();
    toast('Deleted', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

/* ---------- Render ---------- */
function render() {
  const q = $('searchInput').value.toLowerCase().trim();
  const rows = $('rows'); rows.innerHTML = '';
  const list = allStudents.filter(s =>
    !q || (s.name || '').toLowerCase().includes(q) || (s.email || '').toLowerCase().includes(q)
  );
  $('studentsCount').textContent = list.length;
  if (list.length === 0) { show($('emptyState')); return; }
  hide($('emptyState'));

  list.forEach(s => rows.appendChild(rowView(s)));
}

function rowView(s) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><span class="id-cell">#${s.id}</span></td>
    <td data-k="name">${escapeHTML(s.name ?? '')}</td>
    <td data-k="age">${s.age ?? ''}</td>
    <td data-k="grade">${escapeHTML(s.grade ?? '')}</td>
    <td data-k="email">${escapeHTML(s.email ?? '')}</td>
    <td>
      <div class="row-actions">
        <button class="btn btn-ghost btn-sm" data-act="edit">Edit</button>
        <button class="btn btn-danger btn-sm" data-act="del">Delete</button>
      </div>
    </td>`;
  tr.querySelector('[data-act="edit"]').onclick = () => toEdit(tr, s);
  tr.querySelector('[data-act="del"]').onclick  = () => deleteStudent(s.id);
  return tr;
}

function toEdit(tr, s) {
  ['name','age','grade','email'].forEach(k => {
    const td = tr.querySelector(`td[data-k="${k}"]`);
    const v = s[k] ?? '';
    const type = k === 'age' ? 'number' : k === 'email' ? 'email' : 'text';
    td.innerHTML = `<input class="edit-input" data-ek="${k}" type="${type}" value="${escapeAttr(v)}" />`;
  });
  const actionsCell = tr.querySelector('.row-actions');
  actionsCell.innerHTML = `
    <button class="btn btn-success btn-sm" data-act="save">Save</button>
    <button class="btn btn-ghost btn-sm" data-act="cancel">Cancel</button>`;
  actionsCell.querySelector('[data-act="save"]').onclick = () => {
    const payload = {};
    tr.querySelectorAll('.edit-input').forEach(i => {
      payload[i.dataset.ek] = i.type === 'number' ? parseInt(i.value, 10) : i.value.trim();
    });
    updateStudent(s.id, payload);
  };
  actionsCell.querySelector('[data-act="cancel"]').onclick = () => render();
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHTML(s); }

/* ---------- Wire up ---------- */
document.querySelectorAll('.user-btn').forEach(b =>
  b.addEventListener('click', () => {
    $('username').value = b.dataset.u;
    $('password').value = b.dataset.p;
  })
);
$('loginBtn').addEventListener('click', () => login($('username').value.trim(), $('password').value));
[$('username'), $('password')].forEach(i =>
  i.addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); })
);
$('logoutBtn').addEventListener('click', logout);
$('createBtn').addEventListener('click', createStudent);
$('reloadBtn').addEventListener('click', loadStudents);
$('searchInput').addEventListener('input', render);

// Restore settings into the panel
$('apiBase').value = cfg.api;
$('tokenPath').value = cfg.tokenPath;
$('studentsPath').value = cfg.studentsPath;

// Auto-enter dashboard if a token is already stored
if (token) enterDashboard();
</script>
</body>
</html>
